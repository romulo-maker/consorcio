<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesquisa de Grupos Bradesco Consórcio</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Pesquisa de Grupos Bradesco Consórcio</h1>
      <img src="bradesco.jpg" alt="Bradesco Consórcios" class="logo" />
    </div>

    <form id="filtro-form" class="filtro">
      <div class="campo">
        <label for="prazoMin">Prazo restante mínimo</label>
        <select id="prazoMin" required></select>
      </div>

      <div class="campo">
        <label for="prazoMax">Prazo restante máximo</label>
        <select id="prazoMax" required></select>
      </div>

      <div class="campo">
        <label for="tipo">Tipo de consórcio</label>
        <select id="tipo" required>
          <option value="Auto">Automóvel</option>
          <option value="Imóvel">Imóvel</option>
        </select>
      </div>

      <div class="campo">
        <label for="lancePercentual">Valor do lance (%)</label>
        <input type="number" id="lancePercentual" min="0" max="100" step="0.5" value="20" required />
      </div>

      <div class="botoes">
        <button type="submit">Buscar grupos</button>
        <button type="button" id="btn-print" class="btn-secondary">Imprimir / Salvar PDF</button>
      </div>
    </form>

    <p id="status" class="status"></p>

    <table id="grid" class="grid hidden">
      <thead>
        <tr>
          <th data-key="grupo">Grupo</th>
          <th data-key="maiorLance">Maior Lance (%)</th>
          <th data-key="menorLance">Menor Lance (%)</th>
          <th data-key="prazoRestante">Prazo Restante</th>
          <th data-key="mediana">Mediana 12m (%)</th>
        </tr>
      </thead>
      <tbody id="grid-body"></tbody>
    </table>

    <div id="chart-container" class="chart-container hidden">
      <h2 id="chart-title"></h2>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
